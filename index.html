<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport"/>
<meta content="#0b0907" name="theme-color"/>
<meta content="yes" name="mobile-web-app-capable"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<link as="image" href="assets/page1.webp" rel="preload" type="image/webp"/>
<title>UNLOCK SERIES | Answer Page</title>

<link href="css/style.css" rel="stylesheet"/><script defer="True" src="js/data.js"></script><script defer="True" src="js/app.js"></script></head>
<body><noscript>このページを利用するにはJavaScriptを有効にしてください。</noscript>
<div class="book" id="book">
<section aria-hidden="false" class="page page-1 active-page" id="page1">
<main class="puzzle-area" id="puzzleArea"></main>
<div class="start-overlay" id="startOverlay">
<button class="metal-btn start-button" id="startButton" type="button">
          TAP TO START
        </button>
<p>答えをアルファベットで入力してください<br><small>入力が重なる場合は「ABC」キーボードへ切り替えてください</small></p>
<div class="start-controls"><button aria-pressed="true" class="paper-btn compact-btn" id="soundToggle" type="button">SOUND ON</button><button class="paper-btn compact-btn" id="resetProgress" type="button">RESET</button></div></div>
<button class="metal-btn nav-btn" hidden="" id="page1Next" type="button">NEXT</button>
</section>
<section aria-hidden="true" class="page page-2" id="page2">
<div class="page2-inner">
<p class="unlock-message" id="unlockMessage"></p>
<p class="all-locks">ALL LOCKS UNLOCKED</p>
<div aria-hidden="true" class="divider"><span>✦</span></div>
<div class="final-answer">
<div class="final-boxes" id="finalBoxes">
<div class="final-letter"></div><div class="final-letter"></div>
<div class="final-letter"></div><div class="final-letter"></div>
<div class="final-letter"></div><div class="final-letter"></div>
<div class="final-letter"></div><div class="final-letter"></div>
</div>
<div class="final-locks">
<div class="final-lock-slot"><div class="final-padlock">0</div></div><div class="final-lock-slot"><div class="final-padlock">1</div></div><div class="final-lock-slot"><div class="final-padlock">2</div></div><div class="final-lock-slot"><div class="final-padlock">3</div></div><div class="final-lock-slot"><div class="final-padlock">4</div></div><div class="final-lock-slot"><div class="final-padlock">5</div></div><div class="final-lock-slot"><div class="final-padlock">6</div></div><div class="final-lock-slot"><div class="final-padlock">7</div></div>
</div>
</div>
</div>
<button class="metal-btn nav-btn" hidden="" id="page2Next" type="button">NEXT</button>
</section>
<section aria-hidden="true" class="page page-3" id="page3">
<div class="page3-inner">
<div aria-hidden="true" class="divider"><span>✦</span></div>
<p class="third-message" id="thirdMessage"></p>
<div aria-hidden="true" class="divider"><span>✦</span></div>
<div class="third-answer-panel" id="thirdAnswerPanel">
<input aria-label="最終回答" autocapitalize="characters" autocomplete="off" autocorrect="off" class="third-answer-input" id="thirdAnswerInput" inputmode="latin" lang="en" maxlength="6" pattern="[A-Za-z]+" spellcheck="false" type="text"/>
<div class="third-actions">
<button class="metal-btn" id="thirdCheckButton" type="button">CHECK</button>
<button class="paper-btn" id="thirdHintButton" type="button">HINT</button>
</div>
<div class="third-result" id="thirdResult"></div>
</div>
<button class="paper-btn previous-answer-btn" id="previousAnswerButton" type="button">BACK</button>
</div>
<button class="metal-btn nav-btn" hidden="" id="page3Next" type="button">NEXT</button>
</section>
<section aria-hidden="true" class="page page-4" id="page4">
<div class="page4-inner">
<div class="page4-story">
<p>いつかの写真を思い出す</p>
<p>忘れられないあの瞬間</p>
<p>アルバムを開き、そっと取り出した一枚の写真</p>
</div>
<div aria-hidden="true" class="divider page4-divider"><span>✦</span></div>
<div aria-hidden="true" class="page4-cinema-shade" id="page4CinemaShade"></div>
<figure class="memory-photo" id="memoryPhoto">
<img alt="星空の下、古い家を見つめる4人の思い出の写真" class="memory-still" src="assets/memory_photo.webp"/>
<!-- 動画完成後、HTMLと同じフォルダに ending.mp4 を置いてください -->
<video class="memory-video" id="memoryVideo" muted="" playsinline="" poster="" preload="metadata">
<source src="assets/ending.mp4" type="video/mp4"/>
</video>
</figure>
<div aria-hidden="true" class="divider page4-divider lower"><span>✦</span></div>
<div class="found-number">
<p>裏にあった数字は</p>
<div class="found-number-box">7457734</div>
</div>
<div class="page4-answer">
<div class="jp-input-wrap" id="page4InputWrap">
<input aria-label="家に行くための回答" autocapitalize="off" autocomplete="off" class="jp-hidden-input" id="page4AnswerInput" inputmode="text" maxlength="5" spellcheck="false" type="text"/>
<div aria-hidden="true" class="jp-boxes" id="page4Boxes">
<div class="jp-letter"></div>
<div class="jp-letter"></div>
<div class="jp-letter"></div>
<div class="jp-letter"></div>
<div class="jp-letter"></div>
</div>
<small class="page4-input-note">ひらがなで入力してください</small>
</div>
<button class="metal-btn page4-check-btn" id="page4CheckButton" type="button">
            CHECK
          </button>
<div aria-live="polite" class="page4-result" id="page4Result"></div>
</div>
<button class="paper-btn page4-previous-btn" id="page4PreviousButton" type="button">BACK</button>
</div>
<button class="metal-btn nav-btn" hidden="" id="page4Next" type="button">
        NEXT
      </button>
</section>
</div>
<div class="hint-modal" hidden="" id="hintModal">
<div class="hint-backdrop" data-close-hint=""></div>
<section aria-labelledby="hintDialogTitle" aria-modal="true" class="hint-dialog" role="dialog">
<button aria-label="閉じる" class="hint-close" id="hintCloseButton" type="button">×</button>
<p class="hint-kicker">UNLOCK HINT</p>
<h2 class="hint-dialog-title" id="hintDialogTitle"></h2>
<div class="hint-accordion">
<details class="hint-detail">
<summary>ヒント1</summary>
<div class="hint-content" id="hintOne"></div>
</details>
<details class="hint-detail">
<summary>ヒント2</summary>
<div class="hint-content" id="hintTwo"></div>
</details>
</div>
</section>
</div>

</body>
</html>
